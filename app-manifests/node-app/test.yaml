apiVersion: apps/v1
kind: Deployment
metadata:
  name: test
  labels:
    app: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
        - name: api-health-app
          image: 822233328858.dkr.ecr.eu-north-1.amazonaws.com/my-app:v2
          ports:
            - containerPort: 3000
        
